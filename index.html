<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debt Planner — crush your debt, build your future</title>
  <meta name="description" content="Free debt snowball and avalanche calculator with amortization schedules, payment calendar, and credit score tips." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260626b" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="#">
      <div class="brand-mark">$0</div>
      <span>Debt Planner</span>
    </a>
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">📊 Overview</button>
      <button class="tab-btn" data-tab="debts" onclick="switchTab('debts')">💳 My Debts</button>
      <button class="tab-btn" data-tab="strategy" onclick="switchTab('strategy')">🎯 Strategy</button>
      <button class="tab-btn" data-tab="schedule" onclick="switchTab('schedule')">📅 Schedule</button>
      <button class="tab-btn" data-tab="calendar" onclick="switchTab('calendar')">🗓 Calendar</button>
      <button class="tab-btn" data-tab="credit" onclick="switchTab('credit')">⭐ Credit Health</button>
    </div>

    <div id="authArea" class="auth-area">
      <button id="authSignIn" class="btn-auth-signin" title="Sign in with Google">
        <svg width="16" height="16" viewBox="0 0 18 18" aria-hidden="true"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Sign in
      </button>
      <div id="authUserChip" class="auth-user-chip" style="display:none">
        <img id="authUserAvatar" class="auth-avatar" src="" alt="" />
        <span id="authUserName" class="auth-user-name"></span>
        <button id="authSyncNow" class="auth-action-btn" title="Pull latest data from cloud">↻</button>
        <button id="authSignOut" class="auth-action-btn" title="Sign out">✕</button>
      </div>
    </div>
  </div>
</nav>

<main class="main">
  <div id="pane-overview" class="tab-pane active"></div>
  <div id="pane-debts"    class="tab-pane"></div>
  <div id="pane-strategy" class="tab-pane"></div>
  <div id="pane-schedule" class="tab-pane"></div>
  <div id="pane-calendar" class="tab-pane"></div>
  <div id="pane-credit"   class="tab-pane"></div>
</main>

<!-- Debt modal -->
<div id="debtModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Debt</span>
      <button class="btn-icon" onclick="closeDebtModal()">✕</button>
    </div>

    <input type="hidden" id="debtId" />

    <div class="modal-form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Name</label>
        <input type="text" id="debtName" placeholder="e.g. Chase Sapphire, Car Loan" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="debtType">
          <option value="credit_card">Credit Card</option>
          <option value="personal_loan">Personal Loan</option>
          <option value="auto_loan">Auto Loan</option>
          <option value="student_loan">Student Loan</option>
          <option value="medical">Medical Debt</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Current Balance ($)</label>
        <input type="number" id="debtBalance" min="0" step="0.01" placeholder="e.g. 4500.00" />
      </div>
      <div class="form-group">
        <label>Credit Limit ($) <span style="font-weight:400;color:var(--muted-2)">(cards only)</span></label>
        <input type="number" id="debtLimit" min="0" step="100" placeholder="e.g. 10000" />
      </div>
      <div class="form-group">
        <label>APR (%)</label>
        <input type="number" id="debtAPR" min="0" max="100" step="0.1" placeholder="e.g. 22.99" />
      </div>
      <div class="form-group">
        <label>Minimum Payment ($)</label>
        <input type="number" id="debtMin" min="0" step="0.01" placeholder="e.g. 85.00" />
      </div>
      <div class="form-group">
        <label>Payment Due Day <span style="font-weight:400;color:var(--muted-2)">(1–31)</span></label>
        <input type="number" id="debtDueDay" min="1" max="31" placeholder="e.g. 15" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDebtModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDebt()">Save Debt</button>
    </div>
  </div>
</div>

<!-- Payment modal -->
<div id="paymentModal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title">Make a Payment</span>
      <button class="btn-icon" onclick="closePaymentModal()">✕</button>
    </div>
    <input type="hidden" id="paymentDebtId" />
    <div style="margin-bottom:16px">
      <div id="paymentDebtName" style="font-weight:600;font-size:1rem;color:var(--text)"></div>
      <div id="paymentDebtBalance" style="font-size:0.85rem;color:var(--muted);margin-top:2px"></div>
    </div>
    <div class="modal-form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Payment Amount ($)</label>
        <input type="number" id="paymentAmount" min="0.01" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Date</label>
        <input type="date" id="paymentDate" />
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Note <span style="font-weight:400;color:var(--muted-2)">(optional)</span></label>
        <input type="text" id="paymentNote" placeholder="e.g. Monthly minimum" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePaymentModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()">Record Payment</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js?v=20260628a"></script>
<script src="app.js?v=20260628a"></script>
</body>
</html>
